# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title:            My Blog
subtitle:         Work hard, play hard !
description:      This is my blog website
keywords:         Work for yourself !
language:         "en" # default language of the blog. Language codes: http://www.w3schools.com/tags/ref_language_codes.asp

baseurl:          # the subpath of your site, e.g. /blog
url:              https://kleinzcy.github.io
permalink:        /blog/:categories/:title
cover:            /assets/mountain-cover.jpg
# disqus_shortname: "CY"

# Disqus settings（https://disqus.com/）
# disqus_username: chuyuzhang

# Build settings
sass:
    style: compressed
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
include: ['_pages']
exclude: [vendor, "developer-tools"]
plugins:
  - jekyll-mentions
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  ignore:
    envs: [local]
  blanklines: true
  startings: [head, body]

# Google Analytics
ga_track_id: 'UA-153556378-1'            # Format: UA-xxxxxx-xx
ga_domain: auto
